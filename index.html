<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisy Ambient Archive</title>
  <meta
    name="description"
    content="Daisy 的私人作品档案，整理技术美术、实时特效、程序化流程与项目复盘。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <video
    class="room-bg-video"
    id="room-bg-video"
    aria-hidden="true"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    poster="assets/interior-room-reference.png"
  >
    <source src="assets/background-loop.webm" type="video/webm">
    <source src="assets/background-loop.mp4" type="video/mp4">
  </video>
  <canvas id="pixel-bg" aria-hidden="true"></canvas>

  <main class="portfolio-shell" data-portfolio-shell>
    <header class="identity-panel" aria-label="身份信息">
      <p class="eyebrow">Technical Art / Realtime Visuals</p>
      <h1>Daisy</h1>
      <p>作品、流程与技术拆解的私人档案。</p>
      <a class="contact-link" href="mailto:bigorangeyong@gmail.com">bigorangeyong@gmail.com</a>
    </header>

    <section class="album-stage" aria-label="桌面作品档案">
      <div class="archive-status" aria-hidden="true">
        <span data-category-label>Commercial</span>
        <span data-album-count>01 / 01</span>
      </div>

      <div class="album-track" data-album-track aria-live="polite"></div>

      <div class="album-controls">
        <button type="button" class="album-control album-control-prev" data-album-prev aria-label="上一件作品">
          Previous
        </button>
        <button type="button" class="album-control album-control-next" data-album-next aria-label="下一件作品">
          Next
        </button>
      </div>
    </section>

    <nav class="directory" data-category-nav aria-label="作品分类"></nav>
  </main>

  <section
    class="detail-view"
    id="work-detail"
    aria-hidden="true"
    aria-labelledby="detail-title"
  >
    <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <button type="button" class="detail-close" data-detail-close aria-label="关闭作品详情">
        Close
      </button>

      <div class="detail-media" data-detail-media></div>

      <div class="detail-copy">
        <p class="detail-kicker" data-detail-kicker></p>
        <h2 id="detail-title" data-detail-title></h2>
        <p class="detail-summary" data-detail-summary></p>
        <p class="detail-role" data-detail-role></p>
        <ul class="detail-tags" data-detail-tags></ul>
        <ul class="detail-points" data-detail-points></ul>
      </div>
    </div>
  </section>

  <script src="project-data.js"></script>
  <script src="portfolio-state.js"></script>
  <script src="script.js"></script>
</body>
</html>
